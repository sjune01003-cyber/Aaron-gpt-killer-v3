<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GPT Killer">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<title>GPT Killer</title>
<style>
  :root {
    --bg: #0a0a0a;
    --bg2: #141414;
    --bg3: #1e1e1e;
    --border: #2a2a2a;
    --border2: #333;
    --text: #f0f0f0;
    --text2: #999;
    --text3: #555;
    --accent: #e8ff47;
    --accent-dim: rgba(232,255,71,0.12);
    --accent-border: rgba(232,255,71,0.3);
    --red: #ff4444;
    --red-bg: rgba(255,68,68,0.10);
    --red-border: rgba(255,68,68,0.28);
    --yellow: #f59e0b;
    --yellow-bg: rgba(245,158,11,0.10);
    --yellow-border: rgba(245,158,11,0.28);
    --blue: #3b82f6;
    --blue-bg: rgba(59,130,246,0.10);
    --blue-border: rgba(59,130,246,0.28);
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.10);
    --green-border: rgba(34,197,94,0.28);
    --radius: 14px;
    --radius-sm: 8px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: calc(var(--safe-top) + 14px) 20px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .logo-text {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .logo-sub {
    font-size: 11px;
    color: var(--text3);
    margin-top: 1px;
  }

  .header-badge {
    font-size: 10px;
    padding: 3px 8px;
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid var(--accent-border);
    border-radius: 20px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* Main */
  .main {
    padding: 20px 16px calc(var(--safe-bottom) + 32px);
    max-width: 600px;
    margin: 0 auto;
  }

  /* Section label */
  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
  }

  /* File drop */
  .drop-zone {
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    cursor: pointer;
    background: var(--bg2);
    transition: all 0.2s;
    margin-bottom: 12px;
    active: scale(0.98);
  }
  .drop-zone:active { transform: scale(0.98); border-color: var(--accent); }
  .drop-zone.drag { border-color: var(--accent); background: var(--accent-dim); }
  .drop-zone.loaded { border-color: var(--green); border-style: solid; background: var(--green-bg); }

  .drop-icon { font-size: 28px; margin-bottom: 8px; }
  .drop-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .drop-sub { font-size: 12px; color: var(--text3); }
  .drop-formats { display: flex; gap: 6px; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
  .fmt-tag {
    font-size: 10px; padding: 3px 8px;
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 4px; color: var(--text2); font-weight: 600;
    letter-spacing: 0.5px;
  }
  .drop-error { font-size: 12px; color: var(--red); margin-top: 8px; }

  /* Textarea */
  .input-area {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    line-height: 1.7;
    padding: 14px;
    resize: none;
    font-family: inherit;
    min-height: 120px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-area:focus { border-color: var(--accent); }
  .input-area::placeholder { color: var(--text3); }

  /* Char count */
  .char-row {
    display: flex; justify-content: space-between; align-items: center;
    margin: 8px 0 16px;
    font-size: 12px; color: var(--text3);
  }
  .char-warn { color: var(--red); }

  /* Info box */
  .info-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 12px;
    color: var(--text2);
    line-height: 1.6;
    margin-bottom: 16px;
  }

  /* Analyze button */
  .btn-analyze {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: #000;
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    letter-spacing: -0.3px;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-analyze:active { transform: scale(0.97); }
  .btn-analyze:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .btn-stop {
    width: 100%;
    padding: 12px;
    background: var(--bg3);
    color: var(--text2);
    font-size: 14px;
    font-weight: 600;
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    cursor: pointer;
    margin-top: 10px;
    transition: all 0.15s;
  }
  .btn-stop:active { background: var(--bg2); }

  /* Stage text */
  .stage-text {
    text-align: center;
    font-size: 13px;
    color: var(--text2);
    margin: 12px 0;
    min-height: 20px;
  }

  /* Overall result */
  .result-overall {
    border-radius: var(--radius);
    padding: 20px;
    margin: 20px 0 16px;
    display: flex;
    align-items: flex-end;
    gap: 16px;
  }
  .result-pct {
    font-size: 56px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -2px;
  }
  .result-info { padding-bottom: 4px; }
  .result-label { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .result-sub { font-size: 12px; }

  /* Legend */
  .legend {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 14px;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

  /* Chunk cards */
  .chunks { display: flex; flex-direction: column; gap: 10px; }

  .chunk-card {
    border-radius: var(--radius);
    padding: 14px;
    transition: all 0.3s;
  }

  .chunk-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 10px; gap: 10px;
  }

  .chunk-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .chunk-num { font-size: 11px; color: var(--text3); font-weight: 600; }
  .chunk-badge {
    font-size: 11px; font-weight: 700;
    padding: 2px 9px; border-radius: 20px;
  }
  .chunk-perp { font-size: 11px; color: var(--text3); }

  .chunk-score { font-size: 22px; font-weight: 800; flex-shrink: 0; letter-spacing: -1px; }

  /* Score bars */
  .score-bars { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .bar-row {}
  .bar-label-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--text2); margin-bottom: 3px; }
  .bar-track { background: rgba(255,255,255,0.06); border-radius: 2px; height: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; opacity: 0.7; transition: width 0.8s ease; }

  /* Chunk text */
  .chunk-text {
    font-size: 13px; line-height: 1.65; color: var(--text2);
    white-space: pre-wrap; word-break: break-word;
  }

  /* Analyzing shimmer */
  .shimmer {
    background: linear-gradient(90deg, var(--bg3) 25%, var(--border) 50%, var(--bg3) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 4px; height: 14px; margin-bottom: 6px;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* Divider */
  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  /* Spinner */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(0,0,0,0.2);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header class="header">
  <div class="header-logo">
    <div class="logo-icon">🔍</div>
    <div>
      <div class="logo-text">GPT Killer</div>
      <div class="logo-sub">AI 텍스트 탐지기</div>
    </div>
  </div>
  <div class="header-badge">v3.0</div>
</header>

<main class="main">

  <!-- File Upload -->
  <div class="section-label">파일 업로드</div>
  <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <input type="file" id="fileInput" accept=".txt,.md,.pdf,.docx,.hwpx,.hwp" style="display:none">
    <div id="dropContent">
      <div class="drop-icon">📂</div>
      <div class="drop-title">파일을 탭하여 선택</div>
      <div class="drop-sub">또는 여기에 끌어다 놓기</div>
      <div class="drop-formats">
        <span class="fmt-tag">TXT</span>
        <span class="fmt-tag">PDF</span>
        <span class="fmt-tag">DOCX</span>
        <span class="fmt-tag">HWPX</span>
      </div>
    </div>
    <div id="dropError" class="drop-error" style="display:none"></div>
  </div>

  <!-- Text Input -->
  <div class="section-label">텍스트 직접 입력</div>
  <textarea class="input-area" id="textInput" placeholder="분석할 텍스트를 붙여넣으세요&#10;(최소 80자)"></textarea>

  <div class="char-row">
    <span id="charCount">0자</span>
    <span id="charWarn" class="char-warn" style="display:none">80자 이상 필요</span>
  </div>

  <!-- Info -->
  <div class="info-box">
    🔬 <strong>Perplexity 측정 원리</strong><br>
    각 단락의 앞 58%를 AI에게 주고 나머지를 예측하게 한 뒤, 실제 텍스트와 단어 겹침을 계산합니다. 겹침이 많을수록 = 예측 가능 = Perplexity 낮음 = AI 의심. GPT Killer와 동일한 구조입니다.
  </div>

  <!-- Button -->
  <button class="btn-analyze" id="btnAnalyze" disabled onclick="startAnalysis()">
    분석하기 ↗
  </button>
  <button class="btn-stop" id="btnStop" style="display:none" onclick="stopAnalysis()">⏹ 중단</button>

  <div class="stage-text" id="stageText"></div>

  <!-- Results -->
  <div id="results" style="display:none">
    <div class="result-overall" id="overallCard">
      <div class="result-pct" id="overallPct">—</div>
      <div class="result-info">
        <div class="result-label" id="overallLabel">분석 중</div>
        <div class="result-sub" id="overallSub"></div>
      </div>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--red);opacity:0.7"></div>AI 강의심 ≥70%</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--yellow);opacity:0.7"></div>AI 의심 50~69%</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--blue);opacity:0.7"></div>혼합 30~49%</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--green);opacity:0.7"></div>인간적 &lt;30%</div>
    </div>

    <div class="chunks" id="chunksContainer"></div>
  </div>

</main>

<script>
// ─── CONFIG ──────────────────────────────
const API_URL = 'https://api.anthropic.com/v1/messages';
const MODEL = 'claude-sonnet-4-20250514';

const AI_MARKERS = ["또한","따라서","이에 따라","더불어","한편","즉","결론적으로","이처럼","이를 통해","이와 같이","뿐만 아니라","특히","이러한","나아가","더욱이","요약하면","종합하면","중요하다고","필요하다고","보인다","할 수 있다","할 것이다","해야 한다","해야 할","핵심은","해당","측면","관점에서","기반으로","바탕으로","고려하면","필요가 있다","검토해볼","주지할"];

// ─── STATE ───────────────────────────────
let currentText = '';
let abortCtrl = null;
let isAnalyzing = false;

// ─── HEURISTIC ANALYSIS ──────────────────
function heuristic(chunk) {
  const words = chunk.split(/\s+/).filter(w => w.length > 0);
  const sents = chunk.split(/(?<=[.!?。])\s+|(?<=[다죠요\.] )/).filter(s => s.trim().length > 5);
  const lens = sents.map(s => s.trim().length);
  const avg = lens.reduce((a,b)=>a+b,0) / (lens.length||1);
  const std = Math.sqrt(lens.reduce((a,b)=>a+(b-avg)**2,0) / (lens.length||1));
  const burst = Math.min(100, (std/(avg||1))*180);

  let mc = 0;
  AI_MARKERS.forEach(m => { if (chunk.includes(m)) mc++; });
  const ms = Math.max(0, 100-(mc/(words.length||1))*700);

  const unique = new Set(words.map(w=>w.toLowerCase().replace(/[.,!?]/g,'')));
  const ttr = Math.min(100, (unique.size/(words.length||1))*140);

  const ends = ['습니다','입니다','있다','된다','한다','보인다'];
  const ec = {};
  sents.forEach(s => { ends.forEach(e => { if(s.trim().endsWith(e)) ec[e]=(ec[e]||0)+1; }); });
  const maxE = Math.max(...Object.values(ec), 0);
  const eu = sents.length > 2 ? maxE/(sents.length||1) : 0;
  const es = Math.max(0, 100-eu*120);

  return Math.round(Math.max(0, Math.min(100, 100-(burst*0.32+ms*0.36+ttr*0.17+es*0.15))));
}

// ─── CHUNK TEXT ──────────────────────────
function chunkText(text, size=420) {
  const paras = text.split(/\n\n+/).filter(p=>p.trim().length>20);
  if (paras.length <= 1) {
    const cs = [];
    for (let i=0; i<text.length; i+=size) {
      const c = text.slice(i, i+size+60).trim();
      if (c.length > 30) cs.push(c);
    }
    return cs;
  }
  const cs = []; let cur = '';
  for (const p of paras) {
    if ((cur+p).length > size && cur.length > 60) { cs.push(cur.trim()); cur = p; }
    else { cur += (cur ? '\n\n' : '') + p; }
  }
  if (cur.trim().length > 30) cs.push(cur.trim());
  return cs;
}

// ─── PERPLEXITY API CALL ─────────────────
async function measurePerplexity(chunk, signal) {
  const words = chunk.split(/\s+/).filter(w=>w.length>0);
  if (words.length < 10) return { aiProb:50, level:'보통', jaccard:0 };

  const split = Math.floor(words.length*0.58);
  const prefix = words.slice(0,split).join(' ');
  const actual = words.slice(split).join(' ');
  const targetLen = words.slice(split).length;

  const res = await fetch(API_URL, {
    method: 'POST', signal,
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: MODEL,
      max_tokens: 200,
      system: '텍스트 자동완성기입니다. 주어진 텍스트 뒷부분을 자연스럽게 이어 쓰세요. 오직 이어지는 텍스트만 반환하고 설명 없이 그대로 작성하세요.',
      messages: [{ role:'user', content:`다음 텍스트를 이어서 완성하세요 (약 ${targetLen}단어):\n\n${prefix}` }]
    })
  });

  const data = await res.json();
  const predicted = data.content?.find(c=>c.type==='text')?.text?.trim()||'';

  const aW = new Set(actual.split(/\s+/).map(w=>w.toLowerCase().replace(/[.,!?]/g,'')).filter(w=>w.length>1));
  const pW = new Set(predicted.split(/\s+/).map(w=>w.toLowerCase().replace(/[.,!?]/g,'')).filter(w=>w.length>1));
  const inter = [...aW].filter(w=>pW.has(w)).length;
  const union = new Set([...aW,...pW]).size;
  const j = union > 0 ? inter/union : 0;

  return {
    aiProb: Math.min(96, Math.round(j*290)),
    level: j < 0.09 ? '높음' : j < 0.21 ? '보통' : '낮음',
    jaccard: Math.round(j*100)
  };
}

// ─── COLOR HELPERS ───────────────────────
function scoreStyle(p) {
  if (p >= 70) return { color:'var(--red)', bg:'var(--red-bg)', border:'var(--red-border)', label:'AI 강의심' };
  if (p >= 50) return { color:'var(--yellow)', bg:'var(--yellow-bg)', border:'var(--yellow-border)', label:'AI 의심' };
  if (p >= 30) return { color:'var(--blue)', bg:'var(--blue-bg)', border:'var(--blue-border)', label:'혼합' };
  return { color:'var(--green)', bg:'var(--green-bg)', border:'var(--green-border)', label:'인간적' };
}

function overallVerdict(p) {
  if (p >= 72) return 'AI 생성 강하게 의심됨';
  if (p >= 52) return 'AI 생성 가능성 높음';
  if (p >= 35) return '혼합 작성으로 추정';
  return '인간 작성 가능성 높음';
}

// ─── UI HELPERS ──────────────────────────
function setStage(txt) {
  document.getElementById('stageText').textContent = txt;
}

function renderChunkCard(chunk, i, analyzing=false) {
  const score = chunk.finalScore ?? chunk.hScore;
  const s = scoreStyle(score);
  const container = document.getElementById('chunksContainer');
  let card = document.getElementById(`chunk-${i}`);
  
  if (!card) {
    card = document.createElement('div');
    card.id = `chunk-${i}`;
    card.className = 'chunk-card';
    container.appendChild(card);
  }

  card.style.background = s.bg;
  card.style.border = `1px solid ${s.border}`;

  const preview = chunk.text.length > 200 ? chunk.text.slice(0,200)+'…' : chunk.text;

  card.innerHTML = `
    <div class="chunk-header">
      <div class="chunk-meta">
        <span class="chunk-num">단락 ${i+1}</span>
        ${analyzing
          ? `<span class="chunk-perp">예측 중…</span>`
          : `<span class="chunk-badge" style="background:${s.bg};color:${s.color};border:1px solid ${s.border}">${s.label}</span>`
        }
        ${chunk.level ? `<span class="chunk-perp">Perplexity ${chunk.level}</span>` : ''}
        ${chunk.jaccard !== null && chunk.jaccard !== undefined ? `<span class="chunk-perp">겹침 ${chunk.jaccard}%</span>` : ''}
      </div>
      <div class="chunk-score" style="color:${s.color}">${score}%</div>
    </div>

    ${!analyzing ? `
    <div class="score-bars">
      <div class="bar-row">
        <div class="bar-label-row"><span>통계 분석</span><span>${chunk.hScore}%</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${chunk.hScore}%;background:${s.color}"></div></div>
      </div>
      ${chunk.pScore !== null && chunk.pScore !== undefined ? `
      <div class="bar-row">
        <div class="bar-label-row"><span>Perplexity</span><span>${chunk.pScore}%</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${chunk.pScore}%;background:${s.color}"></div></div>
      </div>` : ''}
    </div>` : `<div class="shimmer"></div><div class="shimmer" style="width:70%"></div>`}

    <div class="chunk-text">${preview.replace(/</g,'&lt;')}</div>
  `;
}

function updateOverall(avg, aiN, total) {
  const s = scoreStyle(avg);
  const card = document.getElementById('overallCard');
  card.style.background = s.bg;
  card.style.border = `1px solid ${s.border}`;
  document.getElementById('overallPct').textContent = avg + '%';
  document.getElementById('overallPct').style.color = s.color;
  document.getElementById('overallLabel').textContent = overallVerdict(avg);
  document.getElementById('overallLabel').style.color = s.color;
  document.getElementById('overallSub').textContent = `${total}개 단락 중 ${aiN}개 AI 의심`;
  document.getElementById('overallSub').style.color = 'var(--text2)';
}

// ─── MAIN ANALYSIS ───────────────────────
async function startAnalysis() {
  if (currentText.trim().length < 80) return;
  if (abortCtrl) abortCtrl.abort();
  abortCtrl = new AbortController();
  isAnalyzing = true;

  document.getElementById('btnAnalyze').style.display = 'none';
  document.getElementById('btnStop').style.display = 'block';
  document.getElementById('results').style.display = 'block';
  document.getElementById('chunksContainer').innerHTML = '';

  const parts = chunkText(currentText, 420);
  const results = parts.map(t => ({ text:t, hScore:heuristic(t), pScore:null, finalScore:null, level:null, jaccard:null }));

  // render initial cards
  results.forEach((chunk, i) => renderChunkCard(chunk, i, true));
  setStage(`단락 ${parts.length}개 — Perplexity 분석 시작`);

  for (let i=0; i<parts.length; i++) {
    if (abortCtrl.signal.aborted) break;
    setStage(`Perplexity 예측 분석 중 (${i+1} / ${parts.length})`);
    try {
      const { aiProb, level, jaccard } = await measurePerplexity(parts[i], abortCtrl.signal);
      results[i].pScore = aiProb;
      results[i].finalScore = Math.round(results[i].hScore*0.36 + aiProb*0.64);
      results[i].level = level;
      results[i].jaccard = jaccard;
      renderChunkCard(results[i], i, false);
    } catch(e) {
      if (abortCtrl.signal.aborted) break;
      results[i].finalScore = results[i].hScore;
      renderChunkCard(results[i], i, false);
    }

    // update overall after each chunk
    const done = results.filter(r => r.finalScore !== null);
    if (done.length > 0) {
      const avg = Math.round(done.reduce((a,b)=>a+(b.finalScore||0),0)/done.length);
      const aiN = done.filter(r=>(r.finalScore||0)>=50).length;
      updateOverall(avg, aiN, done.length);
    }
  }

  if (!abortCtrl.signal.aborted) setStage('');
  document.getElementById('btnAnalyze').style.display = 'flex';
  document.getElementById('btnStop').style.display = 'none';
  isAnalyzing = false;
}

function stopAnalysis() {
  if (abortCtrl) abortCtrl.abort();
  isAnalyzing = false;
  setStage('중단됨');
  document.getElementById('btnAnalyze').style.display = 'flex';
  document.getElementById('btnStop').style.display = 'none';
}

// ─── TEXT INPUT ──────────────────────────
const textInput = document.getElementById('textInput');
textInput.addEventListener('input', () => {
  currentText = textInput.value;
  updateCharCount();
});

function updateCharCount() {
  const n = currentText.length;
  document.getElementById('charCount').textContent = n + '자';
  document.getElementById('charWarn').style.display = n < 80 && n > 0 ? 'block' : 'none';
  document.getElementById('btnAnalyze').disabled = n < 80;
}

// ─── FILE UPLOAD ─────────────────────────
document.getElementById('fileInput').addEventListener('change', e => {
  const f = e.target.files[0];
  if (f) handleFile(f);
});

const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f) handleFile(f);
});

async function handleFile(file) {
  const err = document.getElementById('dropError');
  err.style.display = 'none';
  dropZone.classList.remove('loaded');

  try {
    const text = await readFile(file);
    currentText = text.trim();
    textInput.value = currentText;
    dropZone.classList.add('loaded');
    document.getElementById('dropContent').innerHTML = `
      <div class="drop-icon">✅</div>
      <div class="drop-title">${file.name}</div>
      <div class="drop-sub">${currentText.length.toLocaleString()}자 추출됨</div>
    `;
    updateCharCount();
  } catch(e) {
    err.textContent = e.message;
    err.style.display = 'block';
  }
}

async function readFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();

  if (ext === 'txt' || ext === 'md') {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = e => res(e.target.result);
      r.onerror = rej;
      r.readAsText(file, 'utf-8');
    });
  }

  if (ext === 'pdf') {
    const pdfjsLib = await loadPDFJS();
    const ab = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
    let text = '';
    for (let i=1; i<=pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(item => item.str).join(' ') + '\n\n';
    }
    if (!text.trim()) throw new Error('텍스트를 추출할 수 없습니다. 스캔 PDF는 지원되지 않습니다.');
    return text.trim();
  }

  if (ext === 'docx') {
    const mammoth = await loadMammoth();
    const ab = await file.arrayBuffer();
    const result = await mammoth.extractRawText({ arrayBuffer: ab });
    return result.value;
  }

  if (ext === 'hwpx') {
    const JSZip = await loadJSZip();
    const zip = await JSZip.loadAsync(file);
    const entry = zip.file('Preview/PrvText.txt');
    if (!entry) throw new Error('HWPX에서 텍스트를 추출할 수 없습니다');
    return await entry.async('string');
  }

  if (ext === 'hwp') throw new Error('.hwp(구형)은 지원 안 됩니다. 한글에서 .hwpx로 저장해주세요');
  throw new Error(`.${ext} 형식은 지원되지 않습니다`);
}

// ─── LAZY LOADERS ────────────────────────
let _pdfjs, _mammoth, _jszip;

async function loadPDFJS() {
  if (_pdfjs) return _pdfjs;
  const mod = await import('https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.min.mjs');
  mod.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.worker.min.mjs';
  _pdfjs = mod; return mod;
}

async function loadMammoth() {
  if (_mammoth) return _mammoth;
  const mod = await import('https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.esm.js');
  _mammoth = mod.default || mod; return _mammoth;
}

async function loadJSZip() {
  if (_jszip) return _jszip;
  const mod = await import('https://esm.sh/jszip@3');
  _jszip = mod.default; return _jszip;
}

// ─── SERVICE WORKER ──────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
